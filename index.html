<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>实时收入计时器（精确API版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont,
              "SF Pro Display","Helvetica Neue",Arial;
  background:#f5f6f8;
  color:#1d1d1f;
}

.main{
  text-align:center;
  padding:60px 20px;
}

.time{
  font-size:14px;
  color:rgba(0,0,0,0.5);
}

.big{
  font-size:56px;
  font-weight:600;
  margin:20px 0;
}

.status{
  font-size:14px;
  color:rgba(0,0,0,0.5);
}

/* 🍏 信息区 */
.info{
  font-size:12px;
  color:rgba(60,60,67,0.55);
  margin-top:12px;
  line-height:1.8;
}

/* 齿轮 */
#gear{
  position:fixed;
  top:16px;
  right:16px;
  font-size:20px;
  cursor:pointer;
  opacity:0.6;
}

/* 设置面板 */
#panel{
  position:fixed;
  top:0;
  right:-100%;
  width:100%;
  max-width:420px;
  height:100%;
  background:#fff;
  padding:24px;
  box-shadow:-10px 0 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

#panel.show{ right:0; }

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #e5e5e5;
  border-radius:10px;
}

input::placeholder{
  color:rgba(60,60,67,0.35);
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:0;
  border-radius:10px;
  background:#1d1d1f;
  color:#fff;
}

.credit{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  color:rgba(60,60,67,0.25);
}
</style>
</head>

<body>

<div id="gear">⚙️</div>

<div class="main">
  <div class="time">当前时间</div>
  <div id="now"></div>

  <div class="big">¥ <span id="money">0</span></div>

  <div class="info" id="info"></div>

  <div class="status" id="status"></div>
</div>

<div id="panel">
  <h3>设置</h3>

  <input id="salary" placeholder="请输入月薪">
  <input id="factor" placeholder="隐私系数（默认1）" value="1">
  <input id="start" type="time" value="09:00">
  <input id="end" type="time" value="18:00">

  <button onclick="save()">保存并返回</button>
</div>

<div class="credit">Designed by Ethan Cai</div>

<script>

const panel = document.getElementById('panel');

document.getElementById('gear').onclick = () => {
  panel.classList.add('show');
};

function save(){
  localStorage.setItem('salary', salary.value);
  localStorage.setItem('factor', factor.value);
  localStorage.setItem('start', start.value);
  localStorage.setItem('end', end.value);
  panel.classList.remove('show');
}

/* =========================
   API缓存
========================= */
const cache = {};

async function isWorkday(dateStr){

  if(cache[dateStr] !== undefined){
    return cache[dateStr];
  }

  const res = await fetch(`https://timor.tech/api/holiday/info/${dateStr}`);
  const data = await res.json();

  const work = !data.holiday?.rest;

  cache[dateStr] = work;

  return work;
}

/* =========================
   本月工作日
========================= */
async function getMonthWorkdays(){

  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;

  const pad = n => n.toString().padStart(2,'0');
  const days = new Date(y, m, 0).getDate();

  let count = 0;

  for(let d=1; d<=days; d++){
    const dateStr = `${y}-${pad(m)}-${pad(d)}`;
    if(await isWorkday(dateStr)) count++;
  }

  return count;
}

/* =========================
   最近周末 & 假期（含名字）
========================= */
async function getFutureInfo(){

  const now = new Date();
  const pad = n => n.toString().padStart(2,'0');

  let weekend = null;

  let holiday = null;
  let holidayName = "";

  for(let i=1;i<=30;i++){

    const d = new Date();
    d.setDate(now.getDate()+i);

    const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;

    const res = await fetch(`https://timor.tech/api/holiday/info/${dateStr}`);
    const data = await res.json();

    if(!weekend && (d.getDay() === 0 || d.getDay() === 6)){
      weekend = i;
    }

    if(!holiday && data.holiday?.holiday){
      holiday = i;
      holidayName = data.holiday.name || "法定节假日";
    }

    if(weekend && holiday) break;
  }

  return { weekend, holiday, holidayName };
}

/* =========================
   初始化
========================= */
let monthWorkdays = 0;
let futureInfo = { weekend:0, holiday:0, holidayName:"" };

async function init(){
  monthWorkdays = await getMonthWorkdays();
  futureInfo = await getFutureInfo();
}

init();

/* =========================
   主循环
========================= */
function tick(){

  const now = new Date();
  document.getElementById('now').innerText =
    now.toLocaleTimeString();

  const salary = +localStorage.getItem('salary') || 0;
  const factor = +localStorage.getItem('factor') || 1;
  const start = localStorage.getItem('start') || "09:00";
  const end = localStorage.getItem('end') || "18:00";

  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);

  const s = new Date(); s.setHours(sh,sm,0);
  const e = new Date(); e.setHours(eh,em,0);

  const perSec = monthWorkdays
    ? salary * factor / monthWorkdays / ((e - s)/1000)
    : 0;

  let money = 0;
  let status = "";

  if(now < s){
    status = "未上班";
  }else if(now > e){
    money = perSec * ((e - s)/1000);
    status = "已下班";
  }else{
    money = perSec * ((now - s)/1000);
    status = "工作中";
  }

  document.getElementById('money').innerText =
    money.toFixed(2);

  document.getElementById('status').innerText = status;

  /* 🍏 信息展示 */
  document.getElementById('info').innerHTML = `
    本月工作日：${monthWorkdays} 天<br>
    距离最近周末：${futureInfo.weekend || "计算中"} 天<br>
    距离最近假期：${futureInfo.holiday || "计算中"} 天<br>
    ${futureInfo.holiday
      ? `最近假期：${futureInfo.holidayName}`
      : ""
    }
  `;
}

setInterval(tick,1000);

</script>

</body>
</html>
