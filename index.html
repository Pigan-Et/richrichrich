<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>实时收入计时器（CSV版）</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display";
  background:#f5f6f8;
  color:#1d1d1f;
}

.main{
  text-align:center;
  padding:60px 20px;
}

.big{
  font-size:56px;
  font-weight:600;
  margin:20px 0;
}

.info{
  font-size:12px;
  color:rgba(60,60,67,0.55);
  margin-top:10px;
  line-height:1.8;
}

#gear{
  position:fixed;
  right:16px;
  top:16px;
  font-size:20px;
  opacity:0.6;
  cursor:pointer;
}

#panel{
  position:fixed;
  top:0;
  right:-100%;
  width:100%;
  max-width:420px;
  height:100%;
  background:#fff;
  padding:20px;
  transition:0.3s;
}

#panel.show{ right:0; }

input{
  width:100%;
  padding:10px;
  margin:8px 0;
}

button{
  width:100%;
  padding:12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:10px;
}

</style>
</head>

<body>

<div id="gear">⚙️</div>

<div class="main">
  <div id="now"></div>
  <div class="big">¥ <span id="money">0</span></div>

  <div class="info" id="info"></div>
</div>

<div id="panel">
  <h3>上传节假日CSV</h3>
  <input type="file" id="csvFile">

  <h3>设置</h3>
  <input id="salary" placeholder="月薪">
  <input id="factor" placeholder="系数" value="1">
  <input id="start" type="time" value="09:00">
  <input id="end" type="time" value="18:00">

  <button onclick="save()">保存</button>
</div>

<script>

let holidayMap = {}; // date -> {type,name}

document.getElementById('gear').onclick = ()=>{
  document.getElementById('panel').classList.add('show');
};

/* =========================
   CSV解析
========================= */
document.getElementById('csvFile').addEventListener('change', async function(e){

  const text = await e.target.files[0].text();

  const lines = text.split('\n').slice(1);

  lines.forEach(l=>{
    if(!l.trim()) return;

    const [date,type,name,wage] = l.split(',');

    holidayMap[date] = {type,name,wage};
  });

  alert("CSV加载完成");
});

/* =========================
   判断是否工作日
========================= */
function isWorkday(date){

  const record = holidayMap[date];

  if(record){
    if(record.type === "holiday") return false;
    if(record.type === "workday") return true;
  }

  const d = new Date(date);
  const day = d.getDay();

  return !(day === 0 || day === 6);
}

/* =========================
   tick
========================= */
function tick(){

  const now = new Date();
  document.getElementById('now').innerText =
    now.toLocaleTimeString();

  const salary = +localStorage.getItem('salary') || 0;
  const factor = +localStorage.getItem('factor') || 1;

  const start = localStorage.getItem('start') || "09:00";
  const end = localStorage.getItem('end') || "18:00";

  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);

  const s = new Date(); s.setHours(sh,sm,0);
  const e = new Date(); e.setHours(eh,em,0);

  /* =========================
     计算本月工作日（CSV版）
  ========================= */
  const nowMonth = now.getMonth()+1;
  const nowYear = now.getFullYear();

  let workdays = 0;

  for(let d=1; d<=31; d++){

    const date = `${nowYear}-${String(nowMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

    if(isWorkday(date)) workdays++;
  }

  const perSec = salary * factor / workdays / ((e - s)/1000);

  let money = 0;

  if(now < s){
    money = 0;
  }else if(now > e){
    money = perSec * ((e - s)/1000);
  }else{
    money = perSec * ((now - s)/1000);
  }

  document.getElementById('money').innerText =
    money.toFixed(2);

  document.getElementById('info').innerHTML =
    `本月工作日：${workdays} 天（CSV计算）`;
}

setInterval(tick,1000);

/* =========================
   保存设置
========================= */
function save(){
  localStorage.setItem('salary', salary.value);
  localStorage.setItem('factor', factor.value);
  localStorage.setItem('start', start.value);
  localStorage.setItem('end', end.value);
  document.getElementById('panel').classList.remove('show');
}

</script>

</body>
</html>
