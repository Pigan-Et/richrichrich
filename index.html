<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>实时收入计时器</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC",sans-serif;
  background:#f5f6f8;
  color:#1d1d1f;
}

.main{
  text-align:center;
  padding:60px 20px;
}

.time{
  font-size:14px;
  color:rgba(0,0,0,0.5);
}

.big{
  font-size:56px;
  font-weight:600;
  margin:20px 0;
  font-variant-numeric: tabular-nums;
}

.info{
  font-size:12px;
  color:rgba(60,60,67,0.55);
  margin-top:12px;
  line-height:1.8;
}

.status{
  font-size:14px;
  color:rgba(0,0,0,0.5);
}

#gear{
  position:fixed;
  top:16px;
  right:16px;
  font-size:20px;
  cursor:pointer;
  opacity:0.6;
}

#panel{
  position:fixed;
  top:0;
  right:-100%;
  width:100%;
  max-width:420px;
  height:100%;
  background:#fff;
  padding:24px;
  box-shadow:-10px 0 30px rgba(0,0,0,0.08);
  transition:0.3s;
  box-sizing: border-box;
  z-index: 100;
}

#panel.show{ right:0; }

h3{ margin-top: 0; }

input{
  width:100%;
  padding:12px;
  margin:8px 0;
  border:1px solid #e5e5e5;
  border-radius:10px;
  box-sizing: border-box;
}

button{
  width:100%;
  padding:12px;
  margin-top:12px;
  border:0;
  border-radius:10px;
  background:#1d1d1f;
  color:#fff;
  cursor:pointer;
}

.credit{
  position:fixed;
  bottom:18px;
  left:50%;
  transform:translateX(-50%);
  font-size:11px;
  color:rgba(60,60,67,0.25);
}
</style>
</head>

<body>

<div id="gear">⚙️</div>

<div class="main">
  <div class="time">当前时间</div>
  <div id="now">--:--:--</div>

  <div class="big">¥ <span id="money">0.0000</span></div>

  <div class="info" id="info"></div>

  <div class="status" id="status">载入中</div>
</div>

<div id="panel">
  <h3>设置</h3>
  <input id="salary" placeholder="请输入月薪" type="number">
  <input id="factor" placeholder="隐私系数（默认1）" value="1">
  <input id="start" type="time" value="09:00">
  <input id="end" type="time" value="18:00">
  <button onclick="save()">保存并返回</button>
</div>

<div class="credit">Designed by Ethan Cai</div>

<script>
document.getElementById('gear').onclick = ()=>{
  document.getElementById('panel').classList.add('show');
};

function save(){
  localStorage.setItem('salary', document.getElementById('salary').value);
  localStorage.setItem('factor', document.getElementById('factor').value);
  localStorage.setItem('start', document.getElementById('start').value);
  localStorage.setItem('end', document.getElementById('end').value);
  document.getElementById('panel').classList.remove('show');
  updateMonthConfig();
}

/* =========================
   📌 2026年完整数据 (包含名称用于倒计时)
========================= */
const holidayData = {
  // 元旦
  "2026-01-01": {isHoliday: true, name: "元旦"}, "2026-01-02": {isHoliday: true, name: "元旦"}, "2026-01-03": {isHoliday: true, name: "元旦"},
  "2026-01-04": {isHoliday: false, name: "补班"},
  // 春节
  "2026-02-14": {isHoliday: false, name: "补班"},
  "2026-02-15": {isHoliday: true, name: "春节"}, "2026-02-16": {isHoliday: true, name: "除夕"}, "2026-02-17": {isHoliday: true, name: "初一"},
  "2026-02-18": {isHoliday: true, name: "初二"}, "2026-02-19": {isHoliday: true, name: "初三"}, "2026-02-20": {isHoliday: true, name: "初四"},
  "2026-02-21": {isHoliday: true, name: "初五"}, "2026-02-22": {isHoliday: true, name: "初六"}, "2026-02-23": {isHoliday: true, name: "初七"},
  "2026-02-28": {isHoliday: false, name: "补班"},
  // 清明节
  "2026-04-04": {isHoliday: true, name: "清明节"}, "2026-04-05": {isHoliday: true, name: "清明节"}, "2026-04-06": {isHoliday: true, name: "清明节"},
  // 劳动节
  "2026-05-01": {isHoliday: true, name: "劳动节"}, "2026-05-02": {isHoliday: true, name: "劳动节"}, "2026-05-03": {isHoliday: true, name: "劳动节"},
  "2026-05-04": {isHoliday: true, name: "劳动节"}, "2026-05-05": {isHoliday: true, name: "劳动节"},
  "2026-05-09": {isHoliday: false, name: "补班"},
  // 端午节
  "2026-06-19": {isHoliday: true, name: "端午节"}, "2026-06-20": {isHoliday: true, name: "端午节"}, "2026-06-21": {isHoliday: true, name: "端午节"},
  // 中秋节
  "2026-09-20": {isHoliday: false, name: "补班"},
  "2026-09-25": {isHoliday: true, name: "中秋节"}, "2026-09-26": {isHoliday: true, name: "中秋节"}, "2026-09-27": {isHoliday: true, name: "中秋节"},
  // 国庆节
  "2026-10-01": {isHoliday: true, name: "国庆节"}, "2026-10-02": {isHoliday: true, name: "国庆节"}, "2026-10-03": {isHoliday: true, name: "国庆节"},
  "2026-10-04": {isHoliday: true, name: "国庆节"}, "2026-10-05": {isHoliday: true, name: "国庆节"}, "2026-10-06": {isHoliday: true, name: "国庆节"},
  "2026-10-07": {isHoliday: true, name: "国庆节"},
  "2026-10-10": {isHoliday: false, name: "补班"}
};

let cachedWorkdays = 0;
let lastUpdateMonth = -1;

function isWorkday(dateStr){
  const record = holidayData[dateStr];
  if(record) return !record.isHoliday;
  const d = new Date(dateStr);
  const day = d.getDay();
  return !(day === 0 || day === 6);
}

function updateMonthConfig() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth() + 1;
  const totalDays = new Date(y, m, 0).getDate();
  let workdays = 0;
  for(let d=1; d<=totalDays; d++){
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    if(isWorkday(dateStr)) workdays++;
  }
  cachedWorkdays = workdays;
  lastUpdateMonth = m;
}

function tick(){
  const now = new Date();
  document.getElementById('now').innerText = now.toLocaleTimeString('zh-CN', {hour12: false});

  if ((now.getMonth() + 1) !== lastUpdateMonth) updateMonthConfig();

  const salary = parseFloat(localStorage.getItem('salary')) || 0;
  const factor = parseFloat(localStorage.getItem('factor')) || 1;
  const startStr = localStorage.getItem('start') || "09:00";
  const endStr = localStorage.getItem('end') || "18:00";

  const [sh, sm] = startStr.split(':').map(Number);
  const [eh, em] = endStr.split(':').map(Number);
  const s = new Date(now); s.setHours(sh, sm, 0, 0);
  const e = new Date(now); e.setHours(eh, em, 0, 0);

  const totalWorkSeconds = (e - s) / 1000;
  const perSec = (salary * factor) / cachedWorkdays / totalWorkSeconds;

  let money = 0;
  let status = "";
  if (now < s) { status = "未开始工作"; money = 0; }
  else if (now > e) { status = "已下班"; money = perSec * totalWorkSeconds; }
  else { status = "赚钱中..."; money = perSec * ((now - s) / 1000); }

  document.getElementById('money').innerText = money.toFixed(4);
  document.getElementById('status').innerText = status;

  // --- 新增计算：距离周末和假期 ---
  
  // 1. 距离周六天数
  const daysToSat = (6 - now.getDay() + 7) % 7;
  const weekendText = daysToSat === 0 ? "今天就是周末！" : `距离周末还有 ${daysToSat} 天`;

  // 2. 距离下一个假期
  let nextHolidayName = "";
  let daysToHoliday = -1;
  
  const todayStr = now.toISOString().split('T')[0];
  const sortedHolidays = Object.keys(holidayData)
    .filter(d => holidayData[d].isHoliday && d >= todayStr)
    .sort();

  if (sortedHolidays.length > 0) {
    const nextDateStr = sortedHolidays[0];
    nextHolidayName = holidayData[nextDateStr].name;
    const diffTime = new Date(nextDateStr) - new Date(todayStr);
    daysToHoliday = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  }

  const holidayText = daysToHoliday >= 0 
    ? `距离下一个假期 ${nextHolidayName}，还有 ${daysToHoliday} 天` 
    : "今年已无法定假期";

  document.getElementById('info').innerHTML = `
    本月工作日：${cachedWorkdays} 天<br>
    ${weekendText}<br>
    ${holidayText}
  `;
  
  if(!document.getElementById('salary').value && salary) {
      document.getElementById('salary').value = salary;
      document.getElementById('factor').value = factor;
      document.getElementById('start').value = startStr;
      document.getElementById('end').value = endStr;
  }
}

updateMonthConfig();
setInterval(tick, 1000);
tick();
</script>

</body>
</html>
